templates:
  general_inquiry:
    subject: "Interest in {title} Position – Internal Medicine Physician"
    body_template: job_email_draft.txt

  academic:
    subject: "Faculty Application Interest – {title} at {employer}"
    body_template: academic_email_draft.txt

  urgent_high_priority:
    subject: "Physician Application – {title} | {employer} | {city}, {state}"
